<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Website</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e1e2f, #3a3a6a);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
        }

        .hero {
            padding: 50px 20px;
        }

        .hero h1 {
            font-size: 45px;
            color: #ffcc70;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            color: black;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }

        footer {
            padding: 20px;
            background: rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

<header>
    🎨 Art Website
</header>

<section class="hero">
    <h1>Welcome to My Art World</h1>
    <p>Discover creativity through colors and imagination</p>
</section>

<section class="gallery">

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?abstract,art">
        <h3>Abstract Art</h3>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?digital,art">
        <h3>Digital Art</h3>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?sketch,drawing">
        <h3>Sketches</h3>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?painting,art">
        <h3>Paintings</h3>
    </div>

</section>

<footer>
    © 2026 Art Website | Created by Jhansi 🚀
</footer>

</body>
</html>
